services:
  app:
    build:
      context: .
    container_name: kuis
    volumes:
      - .:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8011
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
  nginx:
    image: nginx:1.27-alpine
    container_name: kuis-nginx
    depends_on:
      - app
    ports:
      - "8011:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
